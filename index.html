<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="高速記録">
  <meta name="theme-color" content="#1565C0">
  <meta name="description" content="日本の高速道路の走行記録を地図上で管理できるアプリ。走行済み区間を記録して走破率を確認しよう。">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>🚗 高速走行記録</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{font-family:'Hiragino Sans','Yu Gothic','Meiryo',sans-serif;background:#f0f2f5;height:100vh;overflow:hidden}
    #map-container{position:fixed;top:0;left:0;width:100%;height:calc(100vh - 64px - env(safe-area-inset-bottom, 0px));z-index:1}
    #map{width:100%;height:100%}
    .bottom-nav{position:fixed;bottom:0;left:0;width:100%;height:calc(64px + env(safe-area-inset-bottom, 0px));padding-bottom:env(safe-area-inset-bottom, 0px);background:#fff;display:flex;border-top:1px solid #e0e0e0;box-shadow:0 -2px 12px rgba(0,0,0,.1);z-index:1000}
    .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:#9e9e9e;font-size:10px;font-weight:600;transition:color .2s;user-select:none;min-height:44px}
    .nav-item.active{color:#1565C0}
    .nav-icon{font-size:22px}
    .panel{position:fixed;top:0;left:0;width:100%;height:calc(100vh - 64px - env(safe-area-inset-bottom, 0px));background:#f0f2f5;overflow-y:auto;z-index:500;display:none;-webkit-overflow-scrolling:touch}
    .panel.active{display:block}
    .panel-header{background:#1565C0;color:#fff;padding:16px 18px;font-size:17px;font-weight:700;position:sticky;top:0;z-index:10;box-shadow:0 2px 6px rgba(0,0,0,.15)}
    .form-card{background:#fff;margin:12px;border-radius:16px;padding:18px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
    .form-group{margin-bottom:18px}
    .form-label{font-size:12px;font-weight:700;color:#555;margin-bottom:6px;display:block}
    .form-select,.form-input{width:100%;padding:12px 14px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:15px;font-family:inherit;background:#fafafa;appearance:none;-webkit-appearance:none;color:#333}
    .form-select:focus,.form-input:focus{outline:none;border-color:#1565C0;background:#fff}
    .btn-primary{width:100%;padding:15px;background:#1565C0;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 3px 8px rgba(21,101,192,.35)}
    .btn-primary:active{background:#0d47a1}
    .history-item{background:#fff;margin:8px 12px;border-radius:14px;padding:14px 16px;box-shadow:0 1px 4px rgba(0,0,0,.07);display:flex;align-items:center;gap:14px}
    .hw-badge{width:48px;height:48px;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0}
    .hw-badge-name{color:#fff;font-size:10px;font-weight:800;line-height:1.2;text-align:center}
    .hw-badge-num{color:rgba(255,255,255,.85);font-size:9px;font-weight:600}
    .history-info{flex:1;min-width:0}
    .history-route{font-size:14px;font-weight:700;color:#222;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .history-sub{font-size:12px;color:#777;margin-top:3px}
    .history-km{font-size:12px;color:#1565C0;font-weight:600;margin-top:1px}
    .delete-btn{color:#bbb;font-size:20px;cursor:pointer;padding:6px;flex-shrink:0}
    .delete-btn:active{color:#e53935}
    .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px}
    .stats-card{background:#fff;border-radius:14px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
    .stats-label{font-size:11px;font-weight:600;color:#888;margin-bottom:4px}
    .stats-value{font-size:28px;font-weight:800;color:#1565C0;line-height:1.1}
    .stats-unit{font-size:13px;font-weight:500;color:#888}
    .stats-section-card{background:#fff;margin:0 12px 12px;border-radius:16px;padding:16px 18px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
    .stats-section-title{font-size:13px;font-weight:700;color:#333;margin-bottom:14px}
    .hw-stat-row{display:flex;align-items:center;gap:10px;margin-bottom:14px}
    .hw-stat-row:last-child{margin-bottom:0}
    .hw-stat-badge{width:40px;height:40px;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0}
    .hw-stat-badge span{color:#fff;font-size:8px;font-weight:800;text-align:center;line-height:1.3}
    .hw-stat-info{flex:1}
    .hw-stat-name{font-size:12px;font-weight:600;color:#333;margin-bottom:4px}
    .hw-stat-bar-bg{height:7px;background:#ebebeb;border-radius:4px;overflow:hidden}
    .hw-stat-bar{height:7px;border-radius:4px;transition:width .6s}
    .hw-stat-km{font-size:11px;color:#999;margin-top:3px}
    .map-legend{position:fixed;bottom:calc(64px + env(safe-area-inset-bottom, 0px) + 14px);left:10px;background:rgba(255,255,255,.93);border-radius:10px;padding:8px 12px;z-index:400;box-shadow:0 2px 8px rgba(0,0,0,.12);font-size:11px}
    .legend-row{display:flex;align-items:center;gap:7px;margin:3px 0}
    .legend-line{width:22px;height:3px;border-radius:2px}
    .legend-text{color:#555;font-weight:500}
    .header-chip{position:absolute;top:10px;right:10px;background:rgba(255,255,255,.92);border-radius:20px;padding:6px 12px;z-index:400;box-shadow:0 2px 8px rgba(0,0,0,.12);font-size:12px;font-weight:700;color:#1565C0}
    .empty-state{text-align:center;padding:60px 24px;color:#bbb}
    .empty-icon{font-size:52px;margin-bottom:14px}
    .empty-text{font-size:14px;line-height:1.6}
    .toast{position:fixed;bottom:calc(82px + env(safe-area-inset-bottom, 0px));left:50%;transform:translateX(-50%) translateY(8px);background:rgba(30,30,30,.88);color:#fff;padding:11px 22px;border-radius:24px;font-size:13px;font-weight:500;z-index:3000;opacity:0;transition:opacity .25s,transform .25s;white-space:nowrap;max-width:90vw;overflow:hidden;text-overflow:ellipsis;pointer-events:none}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .list-section-label{font-size:11px;font-weight:700;color:#999;padding:10px 16px 4px;letter-spacing:.5px}
    .sort-bar{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
    .sort-btn{flex:1;min-width:0;padding:7px 6px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:11px;font-weight:600;color:#666;background:#fafafa;cursor:pointer;font-family:inherit;white-space:nowrap}
    .sort-btn.active{border-color:#1565C0;color:#1565C0;background:#e8f0fe}
    .data-mgmt-card{background:#fff;margin:12px;border-radius:16px;padding:18px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
    .data-mgmt-title{font-size:13px;font-weight:700;color:#333;margin-bottom:14px}
    .data-mgmt-row{display:flex;gap:10px}
    .btn-export{flex:1;padding:13px;background:#1565C0;color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px}
    .btn-export:active{background:#0d47a1}
    .btn-import{flex:1;padding:13px;background:#fff;color:#1565C0;border:2px solid #1565C0;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px}
    .btn-import:active{background:#e8f0fe}
    .btn-clear-all{width:100%;margin-top:10px;padding:13px;background:#fff;color:#e53935;border:2px solid #e53935;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px}
    .btn-clear-all:active{background:#ffebee}
    .data-note{font-size:11px;color:#999;margin-top:10px;line-height:1.6;text-align:center}
    /* ── プロファイル ─────────────────────────────────── */
    .profile-fab{position:absolute;top:50px;right:10px;background:rgba(255,255,255,.92);border-radius:20px;padding:5px 12px;z-index:400;box-shadow:0 2px 8px rgba(0,0,0,.12);font-size:11px;font-weight:700;color:#555;cursor:pointer;white-space:nowrap;max-width:150px;overflow:hidden;text-overflow:ellipsis}
    .profile-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:3000;display:none;align-items:flex-end}
    .profile-overlay.show{display:flex}
    .profile-sheet{background:#fff;border-radius:20px 20px 0 0;width:100%;max-height:80vh;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom,12px)}
    .profile-sheet-header{display:flex;align-items:center;justify-content:space-between;padding:18px 18px 12px;border-bottom:1px solid #eee;position:sticky;top:0;background:#fff;z-index:1}
    .profile-sheet-title{font-size:17px;font-weight:700;color:#222}
    .profile-close-btn{background:#f0f0f0;border:none;border-radius:50%;width:32px;height:32px;font-size:18px;cursor:pointer;line-height:1}
    .profile-list{padding:10px 14px 0}
    .profile-item{display:flex;align-items:center;gap:10px;padding:13px 14px;border-radius:13px;margin-bottom:8px;background:#f5f7fa;cursor:pointer;transition:background .15s;border:2px solid transparent}
    .profile-item.active-p{background:#E3EFFE;border-color:#1565C0}
    .profile-item-main{flex:1;min-width:0}
    .profile-item-name{font-weight:700;font-size:15px;color:#222}
    .profile-item-meta{font-size:11px;color:#888;margin-top:2px}
    .profile-item-btns{display:flex;gap:5px;flex-shrink:0}
    .p-btn{border:none;border-radius:8px;padding:7px 10px;font-size:13px;cursor:pointer;font-weight:600;font-family:inherit}
    .p-btn-rename{background:#FFF3E0;color:#E65100}
    .p-btn-del{background:#FFEBEE;color:#c62828}
    .profile-new-section{padding:14px 14px 18px;border-top:1px solid #eee;margin-top:4px}
    .profile-new-label{font-size:13px;color:#666;font-weight:600;margin-bottom:9px}
    .profile-new-row{display:flex;gap:8px}
    .profile-new-input{flex:1;border:1.5px solid #ddd;border-radius:10px;padding:11px 13px;font-size:14px;font-family:inherit;outline:none}
    .profile-new-input:focus{border-color:#1565C0}
    .profile-new-btn{background:#1565C0;color:#fff;border:none;border-radius:10px;padding:11px 18px;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:inherit}
    /* ── 路線検索UI ─────────────────────────────────── */
    .region-filter{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
    .region-btn{padding:5px 11px;border:1.5px solid #e0e0e0;border-radius:20px;font-size:12px;cursor:pointer;background:#fff;color:#666;transition:all .18s;font-family:inherit;white-space:nowrap}
    .region-btn.active{background:#1565C0;border-color:#1565C0;color:#fff;font-weight:700}
    .hw-search-wrap{position:relative}
    .hw-search-input{width:100%;padding:12px 14px 12px 38px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:15px;font-family:inherit;background:#fafafa;color:#333;transition:border-color .2s,border-radius .15s}
    .hw-search-input:focus{outline:none;border-color:#1565C0;background:#fff}
    .hw-search-input.open{border-radius:10px 10px 0 0;border-color:#1565C0;background:#fff}
    .hw-search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none}
    .hw-dropdown{position:absolute;z-index:2000;left:0;right:0;max-height:240px;overflow-y:auto;background:#fff;border:1.5px solid #1565C0;border-top:none;border-radius:0 0 10px 10px;display:none;box-shadow:0 6px 20px rgba(0,0,0,.15)}
    .hw-dropdown.open{display:block}
    .hw-drop-item{padding:11px 14px;cursor:pointer;font-size:14px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;gap:8px}
    .hw-drop-item:last-child{border-bottom:none}
    .hw-drop-item:active{background:#e8f0fe}
    .hw-drop-num{font-size:11px;font-weight:800;padding:2px 7px;border-radius:5px;color:#fff;flex-shrink:0}
    .hw-selected-bar{display:none;padding:10px 14px;border:1.5px solid #43a047;border-radius:10px;background:#f1f8e9;font-size:14px;font-weight:700;color:#2e7d32;align-items:center;justify-content:space-between;margin-top:6px}
    .hw-selected-bar.show{display:flex}
    .hw-clear-btn{background:none;border:none;cursor:pointer;color:#9e9e9e;font-size:22px;line-height:1;padding:0 2px;font-family:inherit}
  </style>
</head>
<body>
<div id="map-container">
  <div id="map"></div>
  <div class="map-legend">
    <div class="legend-row"><div style="width:22px;height:2px;border-top:2px dashed #aaa"></div><span class="legend-text">未走行</span></div>
    <div class="legend-row"><div class="legend-line" style="background:#E91E63;height:4px"></div><span class="legend-text">走行済み</span></div>
  </div>
  <div class="header-chip" id="map-chip">地図を読込中…</div>
  <div class="profile-fab" id="profile-fab" onclick="openProfileModal()">👤 読込中</div>
</div>
<nav class="bottom-nav">
  <div class="nav-item active" onclick="showTab('map')" id="nav-map"><span class="nav-icon">🗺️</span><span>地図</span></div>
  <div class="nav-item" onclick="showTab('record')" id="nav-record"><span class="nav-icon">✏️</span><span>記録</span></div>
  <div class="nav-item" onclick="showTab('history')" id="nav-history"><span class="nav-icon">📋</span><span>履歴</span></div>
  <div class="nav-item" onclick="showTab('stats')" id="nav-stats"><span class="nav-icon">📊</span><span>統計</span></div>
</nav>
<div class="panel" id="panel-record">
  <div class="panel-header">✏️ 走行記録を追加</div>
  <div class="form-card">
    <div class="form-group">
      <label class="form-label">高速道路</label>
      <div class="region-filter">
        <button class="region-btn active" onclick="onRegionBtn(this,'')">全国</button>
        <button class="region-btn" onclick="onRegionBtn(this,'北海道')">北海道</button>
        <button class="region-btn" onclick="onRegionBtn(this,'東北')">東北</button>
        <button class="region-btn" onclick="onRegionBtn(this,'関東')">関東</button>
        <button class="region-btn" onclick="onRegionBtn(this,'中部')">中部</button>
        <button class="region-btn" onclick="onRegionBtn(this,'近畿')">近畿</button>
        <button class="region-btn" onclick="onRegionBtn(this,'中国・四国')">中国・四国</button>
        <button class="region-btn" onclick="onRegionBtn(this,'九州')">九州</button>
      </div>
      <div class="hw-search-wrap">
        <span class="hw-search-icon">🔍</span>
        <input type="text" id="hw-search" class="hw-search-input" placeholder="路線名・番号で検索…" autocomplete="off"
               oninput="openHwDropdown()" onfocus="openHwDropdown()" />
        <div id="hw-dropdown" class="hw-dropdown"></div>
      </div>
      <div id="hw-selected-bar" class="hw-selected-bar">
        <span id="hw-selected-label"></span>
        <button class="hw-clear-btn" onclick="clearHwSelection()">×</button>
      </div>
    </div>
    <div class="form-group"><label class="form-label">乗ったIC・JCT（起点）</label><select class="form-select" id="sel-start"><option value="">先に高速道路を選択</option></select></div>
    <div class="form-group"><label class="form-label">降りたIC・JCT（終点）</label><select class="form-select" id="sel-end"><option value="">先に高速道路を選択</option></select></div>
    <div class="form-group"><label class="form-label">走行日</label><input type="date" class="form-input" id="inp-date"></div>
    <div class="form-group"><label class="form-label">メモ（任意）</label><input type="text" class="form-input" id="inp-memo" placeholder="例：家族旅行、帰省など"></div>
    <button class="btn-primary" onclick="saveRecord()">💾 記録を保存</button>
  </div>
</div>
<div class="panel" id="panel-history"><div class="panel-header">📋 走行履歴</div><div id="history-list"></div></div>
<div class="panel" id="panel-stats">
  <div class="panel-header" style="display:flex;justify-content:space-between;align-items:center">
    <span>📊 走行統計</span>
    <button onclick="shareToX()" style="background:rgba(255,255,255,0.18);color:#fff;border:1.5px solid rgba(255,255,255,0.5);border-radius:20px;padding:7px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;min-height:36px">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.746l7.73-8.835L1.254 2.25H8.08l4.258 5.632 5.906-5.632zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
      シェア
    </button>
  </div>
  <div id="stats-content"></div>
  <div class="data-mgmt-card">
    <div class="data-mgmt-title">💾 データ管理</div>
    <div class="data-mgmt-row">
      <button class="btn-export" onclick="exportData()">📤 書き出す</button>
      <button class="btn-import" onclick="document.getElementById('import-input').click()">📥 読み込む</button>
    </div>
    <p class="data-note">書き出し：走行データをJSONファイルに保存<br>読み込み：別の端末や以前のデータを復元</p>
    <button class="btn-clear-all" onclick="clearAllRecords()">🗑️ 全記録を消す</button>
    <input type="file" id="import-input" accept=".json" style="display:none" onchange="importData(event)">
  </div>
</div>
<!-- プロファイル切り替えモーダル -->
<div class="profile-overlay" id="profile-overlay" onclick="if(event.target===this)closeProfileModal()">
  <div class="profile-sheet">
    <div class="profile-sheet-header">
      <div class="profile-sheet-title">👤 プロファイル</div>
      <button class="profile-close-btn" onclick="closeProfileModal()">✕</button>
    </div>
    <div class="profile-list" id="profile-list"></div>
    <div class="profile-new-section">
      <div class="profile-new-label">➕ 新しいプロファイルを作成</div>
      <div class="profile-new-row">
        <input type="text" class="profile-new-input" id="profile-new-input" placeholder="例: 2024年、車A、家族旅行" maxlength="20">
        <button class="profile-new-btn" onclick="createProfile(document.getElementById('profile-new-input').value)">作成</button>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const HIGHWAYS = [

// ─── ナンバリングソートキー ──────────────────────────────
// E1 < E1A < E2 < ... < E98 < C1 < C2 < C3 < C4 < CA
function numSortKey(num) {
  const first = num.split('/')[0];
  if (first.startsWith('C')) {
    const rest = first.slice(1);
    if (rest === 'A') return [1, 9999, 0];
    return [1, parseInt(rest) || 0, 0];
  }
  const em = first.match(/^E(\d+)([A-Z]?)$/);
  if (em) return [0, parseInt(em[1]), em[2] ? 1 : 0];
  const rm = first.match(/^R(\d+)$/);
  if (rm) return [2, parseInt(rm[1]), 0];
  return [3, 0, 0];
}
function numCompare(a, b) {
  const ka = numSortKey(a), kb = numSortKey(b);
  for (let i = 0; i < 3; i++) { if (ka[i] !== kb[i]) return ka[i] - kb[i]; }
  return 0;
}

function saveToStorage() {

}

function initMap() {
  map = L.map('map', { zoomControl: false, attributionControl: false }).setView([36.5, 137.0], 5);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 18 }).addTo(map);
  L.control.zoom({ position: 'topright' }).addTo(map);
  L.control.attribution({ position: 'bottomright', prefix: '© OpenStreetMap' }).addTo(map);
  renderMap();
  updateMapChip();
}

function renderMap() {
  Object.values(polylineLayers).forEach(segs => segs.forEach(p => map.removeLayer(p)));
  polylineLayers = {};
  HIGHWAYS.forEach(hw => {
    const segs = [];
    for (let i = 0; i < hw.ics.length - 1; i++) {
      const a = hw.ics[i], b = hw.ics[i+1];
      const isGap = !!a.gap_after; // 物理的に途切れた区間（未開通等）
      if (isGap) {
        // 未開通・途切れ区間：薄いオレンジ点線（走行不能区間として表示）
        const pl = L.polyline([[a.lat,a.lng],[b.lat,b.lng]], {
          color: '#FF6F00',
          weight: 2,
          opacity: 0.28,
          dashArray: '4,10'
        }).addTo(map);
        pl.bindPopup(`<b style="color:${hw.color}">${hw.short}（${hw.num}）</b><br>${a.n} → ${b.n}<br><span style="color:#FF6F00">🚧 未開通区間</span>`);
        segs.push(pl);
      } else {
        const driven = isSegmentDriven(hw.id, i);
        const show = driven;
        const pl = L.polyline([[a.lat,a.lng],[b.lat,b.lng]], {
          color: show ? hw.color : '#aaaaaa',
          weight: show ? 5 : 2.5,
          opacity: show ? 0.92 : 0.45,
          dashArray: show ? null : '7,5'
        }).addTo(map);
        pl.bindPopup(`<b style="color:${hw.color}">${hw.short}（${hw.num}）</b><br>${a.n} → ${b.n}<br><span style="color:${driven?'#43a047':'#999'}">${driven?'✅ 走行済み':'⬜ 未走行'}</span><br><button onmousedown="map.closePopup();selectHwFromMap('${hw.id}')" style="margin-top:8px;width:100%;padding:7px 0;background:#1565C0;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">✏️ この路線を記録</button>`);
        segs.push(pl);
      }
    }
    polylineLayers[hw.id] = segs;
  });
}

function isSegmentDriven(hwId, idx) {
  // gap_after のある区間は走行済みとして扱わない
  const hw = HIGHWAYS.find(h => h.id === hwId);
  if (hw && hw.ics[idx] && hw.ics[idx].gap_after) return false;
  return records.some(r => r.hw === hwId && idx >= r.s && idx < r.e);
}

// gap_after:true の区間を除いた走行可能距離を返す
function calcBuiltKm(hw) {
  let km = 0;
  for (let i = 0; i < hw.ics.length - 1; i++) {
    if (!hw.ics[i].gap_after &&
        hw.ics[i].km !== undefined && hw.ics[i+1].km !== undefined)
      km += hw.ics[i+1].km - hw.ics[i].km;
  }
  return km;
}

function calcTotalDrivenKm() {
  let km = 0;
  HIGHWAYS.forEach(hw => {
    const driven = new Set();
    records.filter(r => r.hw === hw.id).forEach(r => { for(let i=r.s;i<r.e;i++) driven.add(i); });
    // gap区間は走行距離から除外
    driven.forEach(i => {
      if (i < hw.ics.length-1 && !hw.ics[i].gap_after &&
          hw.ics[i].km !== undefined && hw.ics[i+1].km !== undefined)
        km += hw.ics[i+1].km - hw.ics[i].km;
    });
  });
  return km;
}

function updateMapChip() {
  const t = calcTotalDrivenKm();
  document.getElementById('map-chip').textContent = t > 0 ? `🚗 累計 ${t.toFixed(0)} km` : '走行済み区間を記録しよう';
  const fab = document.getElementById('profile-fab');
  if (fab) {
    const profiles = JSON.parse(localStorage.getItem('hwy_profiles') || '[]');
    const p = profiles.find(p => p.id === activeProfileId);
    fab.textContent = p ? `👤 ${p.name}` : '👤 プロファイル';
  }
}

// ─── 路線検索UI ───────────────────────────────────────────
let selectedHwId = '';
let hwSearchRegion = '';

function classifyIC(lat, lng) {
  if (lat > 41.5) return '北海道';
  if (lat > 38.5 && lng > 138.0) return '東北';
  if (lat > 37.3 && lng > 139.7) return '東北';
  if (lat > 36.5 && lng > 140.5) return '東北'; // いわき以北の太平洋岸
  if (lat > 34.5 && lat < 37.3 && lng > 138.5) return '関東';
  if (lat > 35.5 && lng > 135.5) return '中部'; // 北陸・新潟エリア
  if (lng > 136.5) return '中部';
  if (lng >= 134.7) return '近畿';
  if (lng > 130.8 && lat > 33.93) return '中国・四国'; // 本州山口以東
  if (lng > 132.0) return '中国・四国'; // 四国
  return '九州';
}
function getRegions(hw) {
  if (!hw.ics.length) return ['全国'];
  const s = new Set();
  hw.ics.forEach(ic => s.add(classifyIC(ic.lat, ic.lng)));
  return [...s];
}

function onRegionBtn(btn, region) {
  document.querySelectorAll('.region-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  hwSearchRegion = region;
  openHwDropdown();
}

function openHwDropdown() {
  const query = (document.getElementById('hw-search').value || '').toLowerCase();
  const dd = document.getElementById('hw-dropdown');
  const inp = document.getElementById('hw-search');
  const filtered = HIGHWAYS.filter(hw => {
    if (hwSearchRegion && !getRegions(hw).includes(hwSearchRegion)) return false;
    if (!query) return true;
    return hw.name.includes(query) || hw.short.includes(query) ||
           hw.num.toLowerCase().includes(query);
  });
  // ナンバリング順にソート（E1,E1A,E2…C2,C3… の順）
  function parseHwNum(num) {
    const first = num.split('/')[0];
    const m = first.match(/^([A-Z]+)(\d+)([A-Z]*)$/);
    if (!m) return [99, 999, ''];
    const pfx = m[1] === 'E' ? 0 : m[1] === 'C' ? 1 : 2;
    return [pfx, parseInt(m[2]), m[3] || ''];
  }
  filtered.sort((a, b) => {
    const [ap, an, as] = parseHwNum(a.num);
    const [bp, bn, bs] = parseHwNum(b.num);
    if (ap !== bp) return ap - bp;
    if (an !== bn) return an - bn;
    return as.localeCompare(bs);
  });
  if (filtered.length === 0) {
    dd.innerHTML = '<div class="hw-drop-item" style="color:#aaa;cursor:default">該当する路線がありません</div>';
  } else {
    dd.innerHTML = filtered.map(hw =>
      `<div class="hw-drop-item" onmousedown="selectHighway('${hw.id}')">
        <span class="hw-drop-num" style="background:${hw.color}">${hw.num}</span>
        <span>${hw.name}</span>
      </div>`
    ).join('');
  }
  dd.classList.add('open');
  inp.classList.add('open');
}

function closeHwDropdown() {
  document.getElementById('hw-dropdown').classList.remove('open');
  document.getElementById('hw-search').classList.remove('open');
}

function selectHighway(hwId) {
  selectedHwId = hwId;
  const hw = HIGHWAYS.find(h => h.id === hwId);
  if (!hw) return;
  document.getElementById('hw-search').value = '';
  closeHwDropdown();
  document.getElementById('hw-selected-label').textContent = `🛣 ${hw.num}  ${hw.name}`;
  document.getElementById('hw-selected-bar').classList.add('show');
  onHighwayChange();
}

function clearHwSelection() {
  selectedHwId = '';
  document.getElementById('hw-search').value = '';
  document.getElementById('hw-selected-bar').classList.remove('show');
  const ss = document.getElementById('sel-start'), se = document.getElementById('sel-end');
  ss.innerHTML = '<option>先に高速道路を選択</option>';
  se.innerHTML = '<option>先に高速道路を選択</option>';
}

function selectHwFromMap(hwId) {
  showTab('record');
  selectHighway(hwId);
}

function initForm() {
  document.getElementById('inp-date').value = new Date().toISOString().split('T')[0];
  // click outside → close dropdown
  document.addEventListener('click', e => {
    if (!e.target.closest('.hw-search-wrap') && !e.target.closest('.region-filter')) {
      closeHwDropdown();
    }
  });
}

function onHighwayChange() {
  const hwId = selectedHwId;
  const ss = document.getElementById('sel-start'), se = document.getElementById('sel-end');
  ss.innerHTML = ''; se.innerHTML = '';
  if (!hwId) {
    ss.innerHTML = '<option>先に高速道路を選択</option>';
    se.innerHTML = '<option>先に高速道路を選択</option>';
    return;
  }
  const hw = HIGHWAYS.find(h => h.id === hwId);
  hw.ics.forEach((ic, i) => {
    // gap_after:true のICには「この先未開通」マークを付ける
    const gapMark = ic.gap_after ? ' 🚧→' : '';
    ss.add(new Option(`${ic.n}${gapMark}（${ic.km}km）`, i));
    se.add(new Option(`${ic.n}${gapMark}（${ic.km}km）`, i));
  });
  se.value = hw.ics.length - 1;
}

function saveRecord() {
  const hwId = selectedHwId;
  const si = parseInt(document.getElementById('sel-start').value);
  const ei = parseInt(document.getElementById('sel-end').value);
  const date = document.getElementById('inp-date').value;
  const memo = document.getElementById('inp-memo').value.trim();
  if (!hwId) { toast('高速道路を選択してください'); return; }
  if (isNaN(si)||isNaN(ei)) { toast('ICを選択してください'); return; }
  if (si === ei) { toast('起点と終点が同じです'); return; }
  if (!date) { toast('走行日を入力してください'); return; }
  const hw = HIGHWAYS.find(h => h.id === hwId);
  const from = Math.min(si,ei), to = Math.max(si,ei);
  const km = (hw.ics[to].km - hw.ics[from].km).toFixed(1);
  records.push({ id: Date.now().toString(), hw: hwId, s: from, e: to, date, memo });
  saveToStorage(); renderMap(); updateMapChip();
  toast(`${hw.short} ${hw.ics[from].n}〜${hw.ics[to].n}（約${km}km）を記録しました ✅`);
  clearHwSelection();
  document.getElementById('inp-memo').value = '';
  showTab('map');
}

// ═══════════════════════════════════════════════════════════
//  HISTORY
// ═══════════════════════════════════════════════════════════
function renderHistory() {
  const el = document.getElementById('history-list');
  if (!records.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">🛣️</div><div class="empty-text">まだ走行記録がありません<br>「記録」タブから追加してください</div></div>';
    return;
  }
  const sorted = [...records].sort((a,b) => b.date.localeCompare(a.date));
  let html = '', lastDate = '';
  sorted.forEach(r => {
    const hw = HIGHWAYS.find(h => h.id === r.hw);
    if (!hw) return;
    const km = (hw.ics[r.e].km - hw.ics[r.s].km).toFixed(1);
    if (r.date !== lastDate) { html += `<div class="list-section-label">${r.date.replace(/-/g,'/')}</div>`; lastDate = r.date; }
    html += `<div class="history-item">
      <div class="hw-badge" style="background:${hw.color}">
        <span class="hw-badge-name">${hw.short}</span>
        <span class="hw-badge-num">${hw.num}</span>
      </div>
      <div class="history-info">
        <div class="history-route">${hw.ics[r.s].n} → ${hw.ics[r.e].n}</div>
        <div class="history-km">約 ${km} km</div>
        ${r.memo ? `<div class="history-sub">📝 ${r.memo}</div>` : ''}
      </div>
      <div class="delete-btn" onclick="deleteRecord('${r.id}')">×</div>
    </div>`;
  });
  el.innerHTML = html;
}

function deleteRecord(id) {
  if (!confirm('この記録を削除しますか？')) return;
  records = records.filter(r => r.id !== id);
  saveToStorage(); renderMap(); updateMapChip(); renderHistory();
  toast('記録を削除しました');
}

function clearAllRecords() {
  if (records.length === 0) { toast('記録がありません'); return; }
  if (!confirm(`全${records.length}件の記録をすべて削除しますか？\nこの操作は取り消せません。`)) return;
  records = [];
  saveToStorage(); renderMap(); updateMapChip(); renderHistory(); renderStats();
  toast('すべての記録を削除しました');
}

// ═══════════════════════════════════════════════════════════
//  STATS
// ═══════════════════════════════════════════════════════════
function setStatsSort(mode) {
  statsSort = mode;
  renderStats();
}

function renderStats() {
  const hwStats = HIGHWAYS.map(hw => {
    const driven = new Set();
    records.filter(r => r.hw === hw.id).forEach(r => { for(let i=r.s;i<r.e;i++) driven.add(i); });
    let dKm = 0;
    // gap区間は走行距離から除外
    driven.forEach(i => {
      if (i < hw.ics.length-1 && !hw.ics[i].gap_after &&
          hw.ics[i].km !== undefined && hw.ics[i+1].km !== undefined)
        dKm += hw.ics[i+1].km - hw.ics[i].km;
    });
    const maxKm = calcBuiltKm(hw); // 開通済み区間のみの合計km
    return { ...hw, dKm, maxKm, pct: maxKm > 0 ? dKm/maxKm*100 : 0 };
  });

  // 並び替え
  let sorted;
  if (statsSort === 'num') {
    sorted = [...hwStats].sort((a, b) => {
      const nc = numCompare(a.num, b.num);
      if (nc !== 0) return nc;
      return a.name.localeCompare(b.name, 'ja');
    });
  } else if (statsSort === 'pct_desc') {
    sorted = [...hwStats].sort((a, b) => b.pct - a.pct || numCompare(a.num, b.num));
  } else {
    sorted = [...hwStats].sort((a, b) => a.pct - b.pct || numCompare(a.num, b.num));
  }

  const totalDriven = hwStats.reduce((s,h) => s+h.dKm, 0);
  const totalMax = hwStats.reduce((s,h) => s+h.maxKm, 0);
  const coverage = totalMax > 0 ? (totalDriven/totalMax*100).toFixed(1) : '0.0';
  const hwDriven = hwStats.filter(h => h.dKm > 0).length;

  const s = statsSort;
  document.getElementById('stats-content').innerHTML = `
    <div class="stats-grid">
      <div class="stats-card"><div class="stats-label">総走行距離</div><div class="stats-value">${totalDriven.toFixed(0)}<span class="stats-unit"> km</span></div></div>
      <div class="stats-card"><div class="stats-label">路線カバー率</div><div class="stats-value">${coverage}<span class="stats-unit"> %</span></div></div>
      <div class="stats-card"><div class="stats-label">記録件数</div><div class="stats-value">${records.length}<span class="stats-unit"> 件</span></div></div>
      <div class="stats-card"><div class="stats-label">走行した路線数</div><div class="stats-value">${hwDriven}<span class="stats-unit"> / ${HIGHWAYS.length}</span></div></div>
    </div>
    <div class="stats-section-card">
      <div class="stats-section-title">路線別走行状況</div>
      <div class="sort-bar">
        <button class="sort-btn${s==='num'?' active':''}" onclick="setStatsSort('num')">🔢 番号順</button>
        <button class="sort-btn${s==='pct_desc'?' active':''}" onclick="setStatsSort('pct_desc')">📉 走行率高い順</button>
        <button class="sort-btn${s==='pct_asc'?' active':''}" onclick="setStatsSort('pct_asc')">📈 走行率低い順</button>
      </div>
      ${sorted.map(h => `
        <div class="hw-stat-row">
          <div class="hw-stat-badge" style="background:${h.color}"><span>${h.short}</span></div>
          <div class="hw-stat-info">
            <div class="hw-stat-name">${h.num} ${h.name}</div>
            <div class="hw-stat-bar-bg"><div class="hw-stat-bar" style="width:${h.pct}%;background:${h.color}"></div></div>
            <div class="hw-stat-km">${h.dKm.toFixed(1)} / ${h.maxKm.toFixed(1)} km（${h.pct.toFixed(1)}%）</div>
          </div>
        </div>`).join('')}
    </div>`;
}

// ═══════════════════════════════════════════════════════════
//  DATA EXPORT / IMPORT
// ═══════════════════════════════════════════════════════════
function exportData() {
  if (!records.length) { toast('記録がまだありません'); return; }
  const data = {
    version: 1,
    exportedAt: new Date().toISOString(),
    records: records
  };
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = new Date().toISOString().slice(0, 10).replace(/-/g, '');
  a.href = url;
  const profiles = JSON.parse(localStorage.getItem('hwy_profiles') || '[]');
  const activeP = profiles.find(p => p.id === activeProfileId);
  const pName = activeP ? activeP.name.replace(/[^\w\u3040-\u309F\u30A0-\u30FF\u4E00-\u9FFF]/g, '_') : 'data';
  a.download = `highway_records_${pName}_${date}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast(`${records.length}件のデータを書き出しました 📤`);
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      // バージョン1形式チェック
      const imported = Array.isArray(data.records) ? data.records : data;
      if (!Array.isArray(imported)) throw new Error('形式エラー');
      // IDの重複を避けてマージ
      const existingIds = new Set(records.map(r => r.id));
      const newRecs = imported.filter(r => r.hw && !existingIds.has(r.id));
      records = [...records, ...newRecs];
      saveToStorage();
      renderMap();
      updateMapChip();
      toast(`${newRecs.length}件を読み込みました ✅`);
    } catch {
      toast('ファイルの形式が正しくありません ❌');
    }
    event.target.value = '';
  };
  reader.readAsText(file);
}

// ═══════════════════════════════════════════════════════════
//  X SHARE
// ═══════════════════════════════════════════════════════════
function shareToX() {
  const hwStats = HIGHWAYS.map(hw => {
    const driven = new Set();
    records.filter(r => r.hw === hw.id).forEach(r => { for(let i=r.s;i<r.e;i++) driven.add(i); });
    let dKm = 0;
    driven.forEach(i => {
      if (i < hw.ics.length-1 && !hw.ics[i].gap_after &&
          hw.ics[i].km !== undefined && hw.ics[i+1].km !== undefined)
        dKm += hw.ics[i+1].km - hw.ics[i].km;
    });
    return { ...hw, dKm, maxKm: calcBuiltKm(hw) };
  });
  const totalDriven = hwStats.reduce((s,h) => s+h.dKm, 0);
  const totalMax = hwStats.reduce((s,h) => s+h.maxKm, 0);
  const coverage = totalMax > 0 ? (totalDriven/totalMax*100).toFixed(1) : '0.0';
  const hwDriven = hwStats.filter(h => h.dKm > 0).length;
  // 走行率100%の路線
  const completed = hwStats.filter(h => h.maxKm > 0 && h.dKm >= h.maxKm);
  let completedText = '';
  if (completed.length > 0) {
    completedText = '\n🏆 走破済み：' + completed.slice(0, 3).map(h => h.short).join('、') + (completed.length > 3 ? ` 他${completed.length-3}路線` : '');
  }
  const text = `🚗 高速道路走行記録\n📍 累計 ${totalDriven.toFixed(0)} km\n📊 カバー率 ${coverage}%\n🛣️ ${hwDriven} / ${HIGHWAYS.length} 路線走行済み${completedText}\n#高速走行記録 #ドライブ #高速道路`;
  const url = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`;
  window.open(url, '_blank', 'noopener');
}

// ═══════════════════════════════════════════════════════════
//  PROFILE MANAGEMENT
// ═══════════════════════════════════════════════════════════
function openProfileModal() {
  renderProfileList();
  document.getElementById('profile-overlay').classList.add('show');
  document.getElementById('profile-new-input').value = '';
}

function closeProfileModal() {
  document.getElementById('profile-overlay').classList.remove('show');
}

function renderProfileList() {
  const profiles = JSON.parse(localStorage.getItem('hwy_profiles') || '[]');
  const el = document.getElementById('profile-list');
  if (!el) return;
  el.innerHTML = profiles.map(p => {
    const recs = JSON.parse(localStorage.getItem('hwy_records_' + p.id) || '[]');
    const isActive = p.id === activeProfileId;
    const canDelete = profiles.length > 1;
    return `<div class="profile-item${isActive ? ' active-p' : ''}" onclick="switchProfile('${p.id}')">
      <div class="profile-item-main">
        <div class="profile-item-name">${isActive ? '✅ ' : ''}${p.name}</div>
        <div class="profile-item-meta">記録 ${recs.length} 件</div>
      </div>
      <div class="profile-item-btns" onclick="event.stopPropagation()">
        <button class="p-btn p-btn-rename" onclick="renameProfilePrompt('${p.id}')">✏️</button>
        ${canDelete ? `<button class="p-btn p-btn-del" onclick="deleteProfile('${p.id}')">🗑️</button>` : ''}
      </div>
    </div>`;
  }).join('');
}

function switchProfile(profileId) {
  if (profileId === activeProfileId) { closeProfileModal(); return; }
  const profiles = JSON.parse(localStorage.getItem('hwy_profiles') || '[]');
  const p = profiles.find(p => p.id === profileId);
  if (!p) return;
  localStorage.setItem('hwy_active_profile', profileId);
  activeProfileId = profileId;
  records = JSON.parse(localStorage.getItem('hwy_records_' + profileId) || '[]');
  renderMap();
  updateMapChip();
  closeProfileModal();
  toast(`「${p.name}」に切り替えました ✅`);
}

function createProfile(name) {
  name = (name || '').trim();
  if (!name) { toast('名前を入力してください'); return; }
  const profiles = JSON.parse(localStorage.getItem('hwy_profiles') || '[]');
  const id = 'p_' + Date.now();
  profiles.push({ id, name, createdAt: new Date().toISOString() });
  localStorage.setItem('hwy_profiles', JSON.stringify(profiles));
  localStorage.setItem('hwy_records_' + id, '[]');
  localStorage.setItem('hwy_active_profile', id);
  activeProfileId = id;
  records = [];
  renderMap();
  updateMapChip();
  closeProfileModal();
  toast(`「${name}」を作成しました 🎉`);
}

function renameProfilePrompt(profileId) {
  const profiles = JSON.parse(localStorage.getItem('hwy_profiles') || '[]');
  const p = profiles.find(p => p.id === profileId);
  if (!p) return;
  const newName = prompt('新しい名前を入力してください:', p.name);
  if (!newName || !newName.trim()) return;
  p.name = newName.trim();
  localStorage.setItem('hwy_profiles', JSON.stringify(profiles));
  renderProfileList();
  if (profileId === activeProfileId) updateMapChip();
  toast('名前を変更しました ✅');
}

function deleteProfile(profileId) {
  const profiles = JSON.parse(localStorage.getItem('hwy_profiles') || '[]');
  if (profiles.length <= 1) { toast('最後のプロファイルは削除できません'); return; }
  const p = profiles.find(p => p.id === profileId);
  if (!p) return;
  if (!confirm(`「${p.name}」を削除しますか？\nこのプロファイルの記録はすべて消えます。`)) return;
  const idx = profiles.findIndex(p => p.id === profileId);
  profiles.splice(idx, 1);
  localStorage.setItem('hwy_profiles', JSON.stringify(profiles));
  localStorage.removeItem('hwy_records_' + profileId);
  if (activeProfileId === profileId) {
    const newId = profiles[0].id;
    localStorage.setItem('hwy_active_profile', newId);
    activeProfileId = newId;
    records = JSON.parse(localStorage.getItem('hwy_records_' + newId) || '[]');
    renderMap();
    updateMapChip();
    closeProfileModal();
    toast('削除しました');
  } else {
    renderProfileList();
    toast('削除しました');
  }
}

// ═══════════════════════════════════════════════════════════
//  TOAST & BOOT
// ═══════════════════════════════════════════════════════════
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3200);
}

window.addEventListener('load', () => { initMap(); initForm(); });

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
